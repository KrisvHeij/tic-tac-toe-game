<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/main.js" defer></script>
    <title>Frontend Mentor | Tic Tac Toe</title>
  </head>
  <body>
    <main class="container-main">
      <section
        class="container-section start-menu hidden"
        aria-labelledby="pick-player-mark-h1"
      >
        <div>
          <img
            src="./assets/logo.svg"
            alt="Tic Tac Toe logo"
            class="start-logo"
          />
        </div>
        <div class="pick-player-container">
          <h1 id="pick-player-mark-h1" class="text-preset-4">
            Pick player 1's mark
          </h1>
          <div class="pick-mark-container">
            <div class="pick-mark-group">
              <input
                type="radio"
                id="mark-x"
                class="sr-only"
                name="mark"
                value="x"
                checked
              />
              <label class="mark-x" for="mark-x"
                ><span class="sr-only">Mark X</span>
                <svg
                  width="32"
                  height="32"
                  viewbox="0 0 64 64"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M15.002 1.147 32 18.145 48.998 1.147a3 3 0 0 1 4.243 0l9.612 9.612a3 3 0 0 1 0 4.243L45.855 32l16.998 16.998a3 3 0 0 1 0 4.243l-9.612 9.612a3 3 0 0 1-4.243 0L32 45.855 15.002 62.853a3 3 0 0 1-4.243 0L1.147 53.24a3 3 0 0 1 0-4.243L18.145 32 1.147 15.002a3 3 0 0 1 0-4.243l9.612-9.612a3 3 0 0 1 4.243 0Z"
                    fill-rule="evenodd"
                  />
                </svg>
              </label>
            </div>
            <div class="pick-mark-group">
              <input
                type="radio"
                id="mark-o"
                class="sr-only"
                name="mark"
                value="o"
              />
              <label class="mark-o" for="mark-o"
                ><span class="sr-only">Mark O</span>
                <svg
                  width="32"
                  height="32"
                  viewbox="0 0 64 64"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M32 0c17.673 0 32 14.327 32 32 0 17.673-14.327 32-32 32C14.327 64 0 49.673 0 32 0 14.327 14.327 0 32 0Zm0 18.963c-7.2 0-13.037 5.837-13.037 13.037 0 7.2 5.837 13.037 13.037 13.037 7.2 0 13.037-5.837 13.037-13.037 0-7.2-5.837-13.037-13.037-13.037Z"
                  />
                </svg>
              </label>
            </div>
          </div>
          <p class="text-preset-5">Remember: X goes first</p>
        </div>
        <div class="button-container">
          <button class="btn-newgame btn-vs-cpu">New Game (vs CPU)</button>
          <button class="btn-newgame btn-vs-player">
            New Game (vs player)
          </button>
        </div>
      </section>

      <section class="container-section game-board">
        <header class="game-board-header">
          <div>
            <img
              src="./assets/logo.svg"
              alt="Tic Tac Toe logo"
              class="start-logo"
            />
          </div>
          <div class="turn-display">
            <h2>
              <span>
                <svg
                  class=""
                  width="16"
                  height="16"
                  viewbox="0 0 64 64"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M15.002 1.147 32 18.145 48.998 1.147a3 3 0 0 1 4.243 0l9.612 9.612a3 3 0 0 1 0 4.243L45.855 32l16.998 16.998a3 3 0 0 1 0 4.243l-9.612 9.612a3 3 0 0 1-4.243 0L32 45.855 15.002 62.853a3 3 0 0 1-4.243 0L1.147 53.24a3 3 0 0 1 0-4.243L18.145 32 1.147 15.002a3 3 0 0 1 0-4.243l9.612-9.612a3 3 0 0 1 4.243 0Z"
                    fill-rule="evenodd"
                  />
                </svg>
                <svg
                  class="hidden"
                  width="16"
                  height="16"
                  viewbox="0 0 64 64"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M32 0c17.673 0 32 14.327 32 32 0 17.673-14.327 32-32 32C14.327 64 0 49.673 0 32 0 14.327 14.327 0 32 0Zm0 18.963c-7.2 0-13.037 5.837-13.037 13.037 0 7.2 5.837 13.037 13.037 13.037 7.2 0 13.037-5.837 13.037-13.037 0-7.2-5.837-13.037-13.037-13.037Z"
                  />
                </svg>
              </span>
              turn
            </h2>
          </div>
          <div>
            <button class="btn-restart"></button>
          </div>
        </header>
        <div class="game-board-tiles turn-x">
          <button class="tile">
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile">
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile">
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile">
            <span class="tile-hover hidden">
              <svg
                width="40"
                height="40"
                viewbox="0 0 64 64"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M51.12 1.269c.511 0 1.023.195 1.414.586l9.611 9.611c.391.391.586.903.586 1.415s-.195 1.023-.586 1.414L44.441 32l17.704 17.705c.391.39.586.902.586 1.414 0 .512-.195 1.024-.586 1.415l-9.611 9.611c-.391.391-.903.586-1.415.586a1.994 1.994 0 0 1-1.414-.586L32 44.441 14.295 62.145c-.39.391-.902.586-1.414.586a1.994 1.994 0 0 1-1.415-.586l-9.611-9.611a1.994 1.994 0 0 1-.586-1.415c0-.512.195-1.023.586-1.414L19.559 32 1.855 14.295a1.994 1.994 0 0 1-.586-1.414c0-.512.195-1.024.586-1.415l9.611-9.611c.391-.391.903-.586 1.415-.586s1.023.195 1.414.586L32 19.559 49.705 1.855c.39-.391.902-.586 1.414-.586Z"
                  stroke="#31C3BD"
                  stroke-width="2"
                  fill="none"
                />
              </svg>
            </span>
            <span class="tile-played hidden"
              ><svg
                width="40"
                height="40"
                viewbox="0 0 64 64"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M15.002 1.147 32 18.145 48.998 1.147a3 3 0 0 1 4.243 0l9.612 9.612a3 3 0 0 1 0 4.243L45.855 32l16.998 16.998a3 3 0 0 1 0 4.243l-9.612 9.612a3 3 0 0 1-4.243 0L32 45.855 15.002 62.853a3 3 0 0 1-4.243 0L1.147 53.24a3 3 0 0 1 0-4.243L18.145 32 1.147 15.002a3 3 0 0 1 0-4.243l9.612-9.612a3 3 0 0 1 4.243 0Z"
                  fill="#31C3BD"
                  fill-rule="evenodd"
                />
              </svg>
            </span>
          </button>
          <button class="tile">
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile">
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile">
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile">
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile">
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
        </div>
        <footer class="game-board-scores">
          <div class="score score-player-1">
            <div>
              <p class="score-head">x (you)</p>
              <p class="score-count">14</p>
            </div>
          </div>
          <div class="score score-ties">
            <div>
              <p class="score-head">ties</p>
              <p class="score-count">14</p>
            </div>
          </div>
          <div class="score score-player-2">
            <div>
              <p class="score-head">o (<span>cpu</span>)</p>
              <p class="score-count">14</p>
            </div>
          </div>
        </footer>
      </section>
    </main>

    <!-- New game menu start -->

    <!-- Pick player 1's mark Remember: X goes first New Game (vs CPU) New Game (vs
    player) -->

    <!-- New game menu end -->

    <!-- Game board start -->

    <!-- x/o icon -->

    <!-- Oh no, you lost You won! Player -->

    <!-- x/o icon -->

    restart -->

    <!-- Game board end -->
  </body>
</html>
