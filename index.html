<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />

    <title>Frontend Mentor | Tic Tac Toe</title>
  </head>
  <body>
    <section>
      <div>
        <img src="./assets/logo.svg" alt="Tic Tac Toe logo" class="logo" />
      </div>
      <div class="pick-player-container">
        <h1>Pick player 1's mark</h1>
        <div class="pick-mark-container">
          <div class="pick-mark-group">
            <label for="mark-x">Mark X</label>
            <input type="radio" id="mark-x" class="mark" name="mark" />
          </div>
          <div class="pick-mark-group">
            <label for="mark-o">Mark O</label>
            <input type="radio" id="mark-o" class="mark" name="mark" />
          </div>
        </div>
        <p>Remember: X goes first</p>
      </div>
      <div class="button-container">
        <button class="btn btn-newgame">New Game (vs CPU)</button>
        <button class="btn btn-newgame">New Game (vs player)</button>
      </div>
    </section>
