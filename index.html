<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="./js/main.js" defer></script>
    <title>Frontend Mentor | Tic Tac Toe</title>
  </head>
  <body>
    <main class="container-main">
      <section
        id="startMenu"
        class="container-section start-menu"
        aria-labelledby="pick-player-mark-h1"
      >
        <div>
          <img
            src="./assets/logo.svg"
            alt="Tic Tac Toe logo"
            class="start-logo"
          />
        </div>
        <div class="pick-player-container">
          <h1 id="pick-player-mark-h1" class="text-preset-4">
            Pick player 1's mark
          </h1>
          <div class="pick-mark-container">
            <div class="pick-mark-group">
              <input
                type="radio"
                id="mark-x"
                class="sr-only"
                name="mark"
                value="x"
                checked
              />
              <label class="mark-x" for="mark-x"
                ><span class="sr-only">Mark X</span>
                <svg
                  width="32"
                  height="32"
                  viewbox="0 0 64 64"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M15.002 1.147 32 18.145 48.998 1.147a3 3 0 0 1 4.243 0l9.612 9.612a3 3 0 0 1 0 4.243L45.855 32l16.998 16.998a3 3 0 0 1 0 4.243l-9.612 9.612a3 3 0 0 1-4.243 0L32 45.855 15.002 62.853a3 3 0 0 1-4.243 0L1.147 53.24a3 3 0 0 1 0-4.243L18.145 32 1.147 15.002a3 3 0 0 1 0-4.243l9.612-9.612a3 3 0 0 1 4.243 0Z"
                    fill-rule="evenodd"
                  />
                </svg>
              </label>
            </div>
            <div class="pick-mark-group">
              <input
                type="radio"
                id="mark-o"
                class="sr-only"
                name="mark"
                value="o"
              />
              <label class="mark-o" for="mark-o"
                ><span class="sr-only">Mark O</span>
                <svg
                  width="32"
                  height="32"
                  viewbox="0 0 64 64"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M32 0c17.673 0 32 14.327 32 32 0 17.673-14.327 32-32 32C14.327 64 0 49.673 0 32 0 14.327 14.327 0 32 0Zm0 18.963c-7.2 0-13.037 5.837-13.037 13.037 0 7.2 5.837 13.037 13.037 13.037 7.2 0 13.037-5.837 13.037-13.037 0-7.2-5.837-13.037-13.037-13.037Z"
                  />
                </svg>
              </label>
            </div>
          </div>
          <p class="text-preset-5">Remember: X goes first</p>
        </div>
        <div class="button-container">
          <button id="cpu" class="btn-newgame btn-vs-cpu">
            New Game (vs CPU)
          </button>
          <button id="player" class="btn-newgame btn-vs-player">
            New Game (vs player)
          </button>
        </div>
      </section>

      <section id="gameBoard" class="container-section game-board hidden">
        <header class="game-board-header">
          <div>
            <img
              src="./assets/logo.svg"
              alt="Tic Tac Toe logo"
              class="start-logo"
            />
          </div>
          <div class="turn-display">
            <h2>
              <span class="turn-display-svg">
                <svg viewbox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M15.002 1.147 32 18.145 48.998 1.147a3 3 0 0 1 4.243 0l9.612 9.612a3 3 0 0 1 0 4.243L45.855 32l16.998 16.998a3 3 0 0 1 0 4.243l-9.612 9.612a3 3 0 0 1-4.243 0L32 45.855 15.002 62.853a3 3 0 0 1-4.243 0L1.147 53.24a3 3 0 0 1 0-4.243L18.145 32 1.147 15.002a3 3 0 0 1 0-4.243l9.612-9.612a3 3 0 0 1 4.243 0Z"
                    fill-rule="evenodd"
                  />
                </svg>
              </span>
              turn
            </h2>
          </div>
          <div>
            <button
              class="btn-restart"
              command="show-modal"
              commandfor="restart-dialog"
            >
              <span class="sr-only">Restart game</span>
            </button>
            <!-- <button
              class="btn-restart"
              command="show-modal"
              commandfor="next-round-dialog"
            ></button> -->
          </div>
        </header>
        <div class="game-board-tiles turn-x">
          <button class="tile" data-tile="1">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile" data-tile="2">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile" data-tile="3">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile" data-tile="4">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"> </span>
            <span class="tile-played"> </span>
          </button>
          <button class="tile" data-tile="5">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile" data-tile="6">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile" data-tile="7">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile" data-tile="8">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
          <button class="tile" data-tile="9">
            <span class="sr-only tile-text">Speel</span>
            <span class="tile-hover"></span>
            <span class="tile-played"></span>
          </button>
        </div>
        <footer class="game-board-scores">
          <div class="score score-x">
            <div>
              <p class="score-head">x (<span id="scoreTextX"></span>)</p>
              <p id="scoreX" class="score-count"></p>
            </div>
          </div>
          <div class="score score-ties">
            <div>
              <p class="score-head">ties</p>
              <p id="scoreTies" class="score-count"></p>
            </div>
          </div>
          <div class="score score-o">
            <div>
              <p class="score-head">o (<span id="scoreTextO"></span>)</p>
              <p id="scoreO" class="score-count"></p>
            </div>
          </div>
        </footer>
      </section>
      <dialog id="restart-dialog" class="dialog restart-dialog">
        <div class="dialog-inner">
          <div>
            <h3>Restart game?</h3>
            <div>
              <button
                class="btn-dialog btn-dialog-cancel text-preset-4"
                command="close"
                commandfor="restart-dialog"
              >
                No, cancel
              </button>
              <button class="btn-dialog btn-dialog-restart text-preset-4">
                Yes, restart
              </button>
            </div>
          </div>
        </div>
      </dialog>
      <dialog id="next-round-dialog" class="dialog next-round-dialog">
        <div class="dialog-inner">
          <div>
            <div id="winner-text">
              <h3></h3>
              <p id="winner-icon-text"></p>
            </div>
            <div>
              <button
                class="btn-dialog btn-dialog-cancel text-preset-4"
                command="close"
                commandfor="next-round-dialog"
              >
                Quit
              </button>
              <button class="btn-dialog btn-dialog-restart text-preset-4">
                Next round
              </button>
            </div>
          </div>
        </div>
      </dialog>
    </main>
  </body>
</html>
